<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk Modern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-secondary">

<div class="container py-5">
    <h2 class="bg-primary.bg-gradient text-center mb-4">Katalog Produk Kami</h2>

    <div class="row g-3 mb-5">
        <div class="col-md-6">
            <input type="text" id="searchInput" class="form-control" placeholder="Cari nama produk...">
        </div>
        <div class="col-md-6">
            <select id="categoryFilter" class="form-select">
                <option value="all">Semua Kategori</option>
                <option value="Elektronik">Elektronik</option>
                <option value="Pakaian">Pakaian</option>
                <option value="Aksesoris">Aksesoris</option>
                <option value="Rumah Tangga">Rumah Tangga</option>
            </select>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 row-cols-lg-4 g-4" id="productDisplay">
        </div>
</div>

<script src="main.js"/ type="">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
